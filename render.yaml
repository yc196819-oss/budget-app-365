services:
  - type: web
    name: budget-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_BASE_URL
        sync: false

  - type: web
    name: budget-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node budget-ai-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROK_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-2-latest
      - key: GROK_BASE_URL
        value: https://api.x.ai/v1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_SCOPES
        value: openid,email,https://www.googleapis.com/auth/gmail.send
      - key: ALLOW_DEV_RESET_FALLBACK
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
